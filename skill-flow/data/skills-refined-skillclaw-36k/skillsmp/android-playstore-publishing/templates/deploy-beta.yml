# ⚠️ DEPRECATED: This template uses r0adkll/upload-google-play which is deprecated.
# Use /devtools:android-workflow-beta instead, which uses Gradle Play Publisher (GPP).
# GPP is the recommended solution for Play Store publishing.

name: Deploy to Beta Testing

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Testing track'
        required: true
        type: choice
        options:
          - alpha
          - beta
        default: 'beta'
      rollout-percentage:
        description: 'Rollout percentage (1-100)'
        required: false
        type: choice
        options:
          - '100'
          - '50'
          - '20'
          - '10'
        default: '100'

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks
          chmod 600 ${{ github.workspace }}/release.jks
      
      - name: Build release artifacts
        run: |
          ./gradlew clean
          ./gradlew bundleRelease --stacktrace
          ./gradlew assembleRelease --stacktrace
        env:
          SIGNING_KEY_STORE_PATH: ${{ github.workspace }}/release.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      
      - name: Run validation checks
        run: |
          echo "Running pre-deployment validation..."
          
          # Verify AAB exists
          if [ ! -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "❌ AAB not found"
            exit 1
          fi
          
          # Verify APK exists
          if [ ! -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "❌ APK not found"
            exit 1
          fi
          
          # Verify ProGuard mapping exists
          if [ ! -f "app/build/outputs/mapping/release/mapping.txt" ]; then
            echo "❌ ProGuard mapping not found"
            exit 1
          fi
          
          # Verify mapping file is not empty
          if [ ! -s "app/build/outputs/mapping/release/mapping.txt" ]; then
            echo "❌ ProGuard mapping file is empty"
            exit 1
          fi
          
          # Display sizes
          echo "✅ All artifacts generated successfully"
          echo ""
          echo "Build artifacts:"
          echo "- AAB: $(du -h app/build/outputs/bundle/release/app-release.aab | cut -f1)"
          echo "- APK: $(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)"
          echo "- Mapping: $(du -h app/build/outputs/mapping/release/mapping.txt | cut -f1)"
      
      - name: Upload to Play Store (${{ github.event.inputs.track }})
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: {PACKAGE_NAME}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          inAppUpdatePriority: 2
          userFraction: ${{ github.event.inputs.rollout-percentage }}
          whatsNewDirectory: src/main/play/release-notes
          mappingFile: app/build/outputs/mapping/release/mapping.txt
      
      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks
      
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.track }}-release-${{ github.run_number }}
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
      
      - name: Deployment summary
        if: success()
        run: |
          echo "### 🧪 Beta Testing Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to ${{ github.event.inputs.track }} track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Track: \`${{ github.event.inputs.track }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Rollout: ${{ github.event.inputs.rollout-percentage }}%" >> $GITHUB_STEP_SUMMARY
          echo "- Build: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Notify beta testers of new release" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor crash-free rate in Play Console" >> $GITHUB_STEP_SUMMARY
          echo "3. Collect and review tester feedback" >> $GITHUB_STEP_SUMMARY
          echo "4. Fix any issues before production" >> $GITHUB_STEP_SUMMARY
