# MagentaLine EFB Dependencies Template
# Copy relevant sections to your pubspec.yaml

name: magentaline
description: Open-source Electronic Flight Bag
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Functional Programming
  dartz: ^0.10.1

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Database
  sqlite3_flutter_libs: ^0.5.18
  sqlite3: ^2.1.0
  sqflite: ^2.3.0
  path: ^1.8.3

  # Maps
  flutter_map: ^6.0.1
  latlong2: ^0.9.0
  flutter_map_mbtiles: ^1.0.0

  # Location
  geolocator: ^10.1.0
  flutter_compass: ^0.8.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Storage
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2
  uuid: ^4.2.1

  # Background Processing
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

  # Testing
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/tiles/
    - assets/icons/

  fonts:
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
        - asset: fonts/RobotoMono-Bold.ttf
          weight: 700
