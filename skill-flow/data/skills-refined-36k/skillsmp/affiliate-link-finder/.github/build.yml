name: Flutter Build

on:
  workflow_dispatch: # This is the ONLY trigger.

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Deep Clean and Force Pods
        run: |
          flutter clean
          flutter pub get
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -f .bundle
          pod cache clean --all
          pod repo update
          pod install
          cd ..

      - name: Build iOS (.app)
        # We set the environment variable right before the command
        run: |
          export IPHONEOS_DEPLOYMENT_TARGET=26.0
          flutter build ios --release --no-codesign --extra-gen-snapshot-options="--no-precompiled-ios"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/*.app