name: adhd_supplement_app
description: An ADHD supplement education and referral tracking app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.6
  
  # Backend - Downgraded for Swift 5 / Xcode 15.4 compatibility
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_crashlytics: ^3.4.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0
  
  # Utilities
  url_launcher: ^6.2.0
  share_plus: ^9.0.0
  # app_settings: ^7.0.0  # Temporarily removed due to iOS Swift compiler error
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  provider: ^6.1.1
  uuid: ^4.0.0
  audioplayers: ^6.1.0
  
  # Architecture support
  get_it: ^7.6.4
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  http: ^1.6.0
  purchases_flutter: ^8.5.0
  image_picker: ^1.2.1
  pdf: ^3.11.3
  printing: ^5.13.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  mockito: any
  build_runner: ^2.4.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/magnesium_science.png
    - assets/images/vitamin_d_focus.png
    - assets/images/theanine_calm.png
    - assets/images/referral_hero.png
    - assets/sounds/
