# ⚠️ DEPRECATED: This template uses r0adkll/upload-google-play which is deprecated.
# Use /devtools:android-workflow-internal instead, which uses Gradle Play Publisher (GPP).
# GPP is the recommended solution for Play Store publishing.

name: Deploy to Internal Testing

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  deploy-internal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks
          chmod 600 ${{ github.workspace }}/release.jks
      
      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace
        env:
          SIGNING_KEY_STORE_PATH: ${{ github.workspace }}/release.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      
      - name: Verify build outputs
        run: |
          if [ ! -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "❌ AAB not found"
            exit 1
          fi
          
          echo "✅ AAB generated successfully"
          ls -lh app/build/outputs/bundle/release/app-release.aab
      
      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: {PACKAGE_NAME}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: src/main/play/release-notes
          mappingFile: app/build/outputs/mapping/release/mapping.txt
      
      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks
      
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: internal-release-${{ github.run_number }}
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 30
      
      - name: Deployment summary
        if: success()
        run: |
          echo "### 📱 Internal Testing Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to internal testing track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Track: Internal Testing" >> $GITHUB_STEP_SUMMARY
          echo "- Build: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Test on device via Play Console internal testing link" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify app functions correctly" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy to beta when ready" >> $GITHUB_STEP_SUMMARY
