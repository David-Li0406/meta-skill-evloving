    <!-- Task Completion Modal -->
    <div x-show="(phase === 'complete' || phase === 'error') && completionTriggeredLive && !completionModalDismissed"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         @click.self="completionModalDismissed = true"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-8 max-w-md w-full shadow-2xl shadow-black/50 animate-modal text-center relative">
            <!-- Close Button -->
            <button @click="completionModalDismissed = true"
                    class="absolute top-4 right-4 p-2 rounded-lg hover:bg-surface-tertiary transition-colors cursor-pointer">
                <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <!-- Success Icon (completed) -->
            <div x-show="phase === 'complete' && completionResultStatus !== 'partial'" class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <!-- Partial Icon (partial completion) -->
            <div x-show="phase === 'complete' && completionResultStatus === 'partial'" class="w-16 h-16 mx-auto mb-4 rounded-full bg-yellow-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <!-- Error Icon (for error) -->
            <div x-show="phase === 'error'" class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </div>
            <!-- Title -->
            <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2"
                x-text="phase === 'error' ? 'Task Failed' : (completionResultStatus === 'partial' ? 'Task Partially Complete' : 'Task Complete')"></h2>
            <!-- Description -->
            <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm"
               x-text="phase === 'error' ? 'An error occurred during task execution.' : (completionResultStatus === 'partial' ? 'Some steps completed but others encountered errors.' : 'Your task has been completed successfully.')"></p>
            <!-- Error detail (shown when errorMessage is available) -->
            <div x-show="phase === 'error' && errorMessage"
                 class="mb-6 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-left">
                <p class="text-red-400 text-xs font-mono break-words" x-text="errorMessage"></p>
            </div>
            <!-- Save as Recipe Button (only in DAG mode with successful completion) -->
            <button x-show="executionMode === 'dag' && phase === 'complete' && completionResultStatus !== 'partial'"
                    @click="openSaveRecipeModal(); completionModalDismissed = true"
                    class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium shadow-lg transition-all duration-200 flex items-center gap-2 mx-auto mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
                Save as Recipe
            </button>
            <!-- Start New Task Button -->
            <button @click="resetToStart()"
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-lg transition-all duration-200 flex items-center gap-2 mx-auto">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Start New Task
            </button>
        </div>
    </div>
