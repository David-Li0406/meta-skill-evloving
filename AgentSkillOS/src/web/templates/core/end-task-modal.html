    <!-- End Task Confirmation Modal -->
    <div x-show="showEndTaskConfirm"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         @click.self="cancelEndTask()"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-8 max-w-md w-full shadow-2xl shadow-black/50 animate-modal text-center relative">
            <!-- Warning Icon -->
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <!-- Title -->
            <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">End Task?</h2>
            <!-- Description -->
            <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm">Are you sure you want to end this task? All progress will be lost.</p>
            <!-- Buttons -->
            <div class="flex gap-3 justify-center">
                <button @click="cancelEndTask()"
                        class="px-5 py-2.5 bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg font-medium transition-colors">
                    Cancel
                </button>
                <button @click="confirmEndTask()"
                        class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition-colors">
                    End Task
                </button>
            </div>
        </div>
    </div>
