    <!-- Header -->
    <header class="bg-surface-secondary border-b border-border-default sticky top-0 z-20 backdrop-blur-sm bg-opacity-95">
        <div class="container mx-auto px-4 md:px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-violet-600 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">AgentSkillOS</h1>
                <span class="text-xs px-2 py-1 rounded-full bg-surface-tertiary text-gray-500 dark:text-gray-400" x-text="getPhaseLabel()"></span>
            </div>
            <div class="flex items-center gap-4 text-sm">
                <span class="text-gray-500 dark:text-gray-400 max-w-xs truncate hidden sm:inline" x-text="task.substring(0, 50) + (task.length > 50 ? '...' : '')"></span>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-surface-tertiary rounded-full">
                    <svg class="w-4 h-4 text-cyan-500 dark:text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="text-cyan-500 dark:text-cyan-400 font-mono font-medium tabular-nums" x-text="elapsed"></span>
                </div>
                <!-- Theme Toggle -->
                <button @click="darkMode = !darkMode; toggleTheme()"
                        x-data="{ darkMode: isDarkMode() }"
                        class="p-2 rounded-lg bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors"
                        :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                    <!-- Sun icon (shown in dark mode) -->
                    <svg x-show="darkMode" class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <!-- Moon icon (shown in light mode) -->
                    <svg x-show="!darkMode" class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>
