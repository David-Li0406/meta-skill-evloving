    <!-- Tree Browser Modal -->
    <div x-show="showTreeBrowser" x-transition class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-6 max-w-5xl w-full max-h-[90vh] overflow-hidden shadow-2xl shadow-black/50 animate-modal flex flex-col">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Browse All Skills</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Click on skills to add or remove them from your selection</p>
                </div>
                <button @click="showTreeBrowser = false" class="p-2 hover:bg-surface-tertiary rounded-lg transition-colors">
                    <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="mb-4">
                <input
                    type="text"
                    x-model="treeBrowserSearch"
                    placeholder="Search skills by name or description..."
                    class="w-full px-4 py-2 bg-surface-primary border border-border-default rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
            </div>
            <div id="tree-browser" class="flex-1 overflow-auto bg-white dark:bg-[#0D1117] rounded-lg" style="min-height: 400px;"></div>
        </div>
    </div>
