        <!-- Phase: SEARCHING - Search Progress (only in full mode, tree visual) -->
        <div x-show="phase === 'searching' && uiHints.has_search && uiHints.search_visual === 'tree'" x-transition class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
            <!-- Search Progress -->
            <div class="lg:col-span-4 bento-card">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <!-- Searching icon (spinning) -->
                    <svg x-show="!searchComplete" class="w-5 h-5 text-amber-400 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <!-- Search complete icon (checkmark) -->
                    <svg x-show="searchComplete" class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span x-text="searchComplete ? 'Search Complete' : 'Searching Skill Tree...'"></span>
                </h2>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-500 dark:text-gray-400">LLM Calls:</span>
                        <span class="font-mono text-cyan-500 dark:text-cyan-400" x-text="searchStats.llmCalls"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 dark:text-gray-400">Nodes Explored:</span>
                        <span class="font-mono text-cyan-500 dark:text-cyan-400" x-text="searchStats.nodesExplored"></span>
                    </div>
                </div>
                <!-- Pruning Status -->
                <div class="mt-3 space-y-2">
                    <div x-show="isPruning" x-transition class="flex items-center gap-2 px-3 py-2 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                        <svg class="w-4 h-4 text-amber-400 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <span class="text-amber-400 text-sm">Pruning <span x-text="pruneSkillCount"></span> skills...</span>
                    </div>
                    <div x-show="prunedSkillCount > 0 && !isPruning" x-transition class="flex items-center gap-2 px-3 py-2 bg-green-500/10 border border-green-500/30 rounded-lg">
                        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <span class="text-green-400 text-sm">Pruned to <span x-text="prunedSkillCount"></span> skills</span>
                    </div>
                </div>
                <div class="mt-4 max-h-48 overflow-y-auto">
                    <template x-for="(event, index) in searchEvents.slice(-10)" :key="index">
                        <div class="text-xs py-1 text-gray-500 dark:text-gray-400">
                            <span x-text="formatSearchEvent(event)"></span>
                        </div>
                    </template>
                </div>
                <!-- View Results button (shown when search is complete) -->
                <div x-show="searchComplete" x-transition class="mt-4 pt-4 border-t border-border-default">
                    <button
                        @click="confirmSearchResults()"
                        class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        View Results (<span x-text="searchResult.skills?.length || 0"></span> skills found)
                    </button>
                </div>
            </div>

            <!-- Tree Visualization -->
            <div class="lg:col-span-8 bento-card" style="min-height: 550px;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold">Skills Organized by Capability Tree</h2>
                    <!-- Color Legend -->
                    <div class="flex items-center gap-4 text-xs">
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-cyan-400"></span>
                            <span class="text-gray-500 dark:text-gray-400">Category</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-amber-400"></span>
                            <span class="text-gray-500 dark:text-gray-400">Skill</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></span>
                            <span class="text-gray-500 dark:text-gray-400">Exploring</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-green-500"></span>
                            <span class="text-gray-500 dark:text-gray-400">Selected</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-red-500"></span>
                            <span class="text-gray-500 dark:text-gray-400">Pruned</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-3 h-3 rounded-full bg-gray-500 opacity-40"></span>
                            <span class="text-gray-500 dark:text-gray-400">Rejected</span>
                        </div>
                    </div>
                </div>
                <div id="search-tree" class="w-full h-[500px] overflow-auto"></div>
            </div>
        </div>
