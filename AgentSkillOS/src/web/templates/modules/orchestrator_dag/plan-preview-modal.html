    <!-- Plan Preview Modal -->
    <div x-show="previewPlan" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4" @click.self="closePlanPreview()">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-6 max-w-4xl w-full max-h-[85vh] flex flex-col shadow-2xl shadow-black/50 animate-modal">
            <!-- Header with plan name and zoom controls -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-2">
                    <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <span x-text="previewPlan?.name || 'Plan Preview'"></span>
                </h2>
                <div class="flex items-center gap-2">
                    <!-- Zoom controls -->
                    <button @click="previewZoom = Math.max(0.3, previewZoom - 0.1)"
                            class="p-1.5 rounded-lg bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                        </svg>
                    </button>
                    <span class="text-gray-500 dark:text-gray-400 font-mono tabular-nums w-12 text-center text-xs" x-text="Math.round(previewZoom * 100) + '%'"></span>
                    <button @click="previewZoom = Math.min(3, previewZoom + 0.1)"
                            class="p-1.5 rounded-lg bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                    </button>
                    <button @click="resetPreviewView()"
                            class="p-1.5 rounded-lg bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors cursor-pointer"
                            title="Reset view">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                    </button>
                    <div class="w-px h-6 bg-border-default mx-1"></div>
                    <button @click="closePlanPreview()"
                            class="p-1.5 rounded-lg bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Plan description -->
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-4" x-text="previewPlan?.description || 'No description'"></p>
            <!-- DAG Preview with zoom/pan -->
            <div class="flex-1 overflow-hidden rounded-lg bg-surface-primary/50 border border-border-muted"
                 @wheel="handlePreviewWheel($event)"
                 @mousedown="startPreviewDrag($event)"
                 @mousemove="dragPreview($event)"
                 @mouseup="endPreviewDrag()"
                 @mouseleave="endPreviewDrag()"
                 :class="isPreviewDragging ? 'cursor-grabbing' : 'cursor-grab'"
                 style="min-height: 400px;">
                <div :style="`transform: translate(${previewPanX}px, ${previewPanY}px) scale(${previewZoom}); transform-origin: top left; transition: ${isPreviewDragging ? 'none' : 'transform 0.2s ease'}; padding: 16px;`"
                     x-html="renderLargePlanPreview()"></div>
            </div>
            <!-- Footer with select button -->
            <div class="mt-4 pt-4 border-t border-border-muted flex justify-between items-center">
                <span class="text-sm text-gray-500 dark:text-gray-400">
                    <span x-text="previewPlan?.nodes?.length || 0"></span> nodes
                    <span class="text-xs ml-2">(Ctrl/Cmd + scroll to zoom, drag to pan)</span>
                </span>
                <button @click="selectPlan((orchestrator?.plans || []).indexOf(previewPlan)); closePlanPreview()"
                        class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Select This Plan
                </button>
            </div>
        </div>
    </div>
