    <!-- Node Log Detail Modal -->
    <div x-show="selectedNodeId" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" @click.self="selectedNodeId = null">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-6 max-w-4xl w-full max-h-[80vh] flex flex-col shadow-2xl shadow-black/50 animate-modal">
            <!-- Header -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-3">
                    <span x-html="getStatusIconSvg(getNodeStatus(selectedNodeId))"></span>
                    <span x-text="selectedNodeId"></span>
                    <span class="text-sm font-normal text-gray-500">Logs</span>
                </h2>
                <button @click="selectedNodeId = null"
                        class="p-2 rounded-lg hover:bg-surface-tertiary transition-colors cursor-pointer">
                    <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <!-- Log content -->
            <div class="flex-1 overflow-y-auto bg-surface-primary rounded-lg p-4 font-mono text-sm" style="max-height: 60vh;">
                <template x-for="(log, index) in getNodeLogs(selectedNodeId)" :key="'modal-' + index">
                    <div class="log-entry py-1" :class="'log-' + log.level">
                        <span class="text-gray-500 text-xs shrink-0 w-16"
                              x-text="index === 0 || getNodeLogs(selectedNodeId)[index-1].timestamp !== log.timestamp ? log.timestamp : ''"></span>
                        <span class="shrink-0" x-html="getLogIconSvg(log.level)"></span>
                        <span class="break-all" x-text="log.message"></span>
                    </div>
                </template>
                <div x-show="getNodeLogs(selectedNodeId).length === 0" class="text-gray-500 h-32 flex items-center justify-center">
                    <span>No logs yet...</span>
                </div>
            </div>
            <!-- Footer -->
            <div class="mt-4 pt-4 border-t border-border-muted flex justify-between items-center text-sm">
                <span class="text-gray-500" x-text="getNodeLogs(selectedNodeId).length + ' log entries'"></span>
                <span class="flex items-center gap-2" :class="getNodeTextClass(getNodeStatus(selectedNodeId))">
                    <span x-html="getStatusIconSvg(getNodeStatus(selectedNodeId))"></span>
                    <span class="capitalize" x-text="getNodeStatus(selectedNodeId)"></span>
                </span>
            </div>
        </div>
    </div>
