<!-- Save Recipe Modal -->
<div x-show="showSaveRecipeModal"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     @click.self="closeSaveRecipeModal()"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-6 max-w-md w-full shadow-2xl shadow-black/50 animate-modal">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-2">
                <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
                Save as Recipe
            </h2>
            <button @click="closeSaveRecipeModal()"
                    class="p-2 rounded-lg hover:bg-surface-tertiary transition-colors">
                <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-500 dark:text-gray-400 mb-1 block">Recipe Name *</label>
                <input type="text"
                       x-model="saveRecipeName"
                       @keydown.enter="saveRecipe()"
                       class="w-full bg-surface-primary border border-border-default rounded-lg p-3 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:border-green-500 focus:outline-none"
                       placeholder="e.g., Frontend Bug Fix Report"
                       maxlength="50">
            </div>

            <!-- Auto-generated description hint -->
            <p class="text-xs text-gray-400 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Description will be auto-generated by AI for better recommendations
            </p>

            <!-- Skills preview -->
            <div class="p-3 bg-surface-tertiary rounded-lg">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">Skills to be saved:</p>
                <div class="flex flex-wrap gap-1">
                    <template x-for="skillId in selectedSkills.slice(0, 5)" :key="skillId">
                        <span class="px-2 py-0.5 text-xs rounded-full bg-purple-500/20 text-purple-400" x-text="skillId"></span>
                    </template>
                    <span x-show="selectedSkills.length > 5" class="text-xs text-gray-400">+<span x-text="selectedSkills.length - 5"></span> more</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 mt-6">
            <button @click="closeSaveRecipeModal()"
                    class="flex-1 px-4 py-2 border border-border-default rounded-lg text-gray-700 dark:text-gray-300 hover:bg-surface-tertiary transition-colors">
                Cancel
            </button>
            <button @click="saveRecipe()"
                    :disabled="!saveRecipeName.trim() || savingRecipe"
                    class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                <svg x-show="savingRecipe" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="32" stroke-dashoffset="12"/>
                </svg>
                <span x-text="savingRecipe ? 'Saving...' : 'Save Recipe'"></span>
            </button>
        </div>
    </div>
</div>
