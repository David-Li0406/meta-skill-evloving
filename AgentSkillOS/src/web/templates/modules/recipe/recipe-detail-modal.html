    <!-- Recipe Detail Modal -->
    <div x-show="selectedRecipeDetail" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" @click.self="closeRecipeDetail()">
        <div class="bg-white dark:bg-[#161B22]/95 backdrop-blur-xl rounded-2xl border border-border-default p-6 max-w-4xl w-full max-h-[85vh] flex flex-col shadow-2xl shadow-black/50 animate-modal">
            <!-- Header -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <span x-text="selectedRecipeDetail?.name || 'Recipe Detail'"></span>
                </h2>
                <button @click="closeRecipeDetail()" class="p-2 hover:bg-surface-tertiary rounded-lg transition-colors">
                    <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-auto space-y-4">
                <!-- Description -->
                <div class="bg-surface-primary rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Description</h3>
                    <p class="text-gray-700 dark:text-gray-200" x-text="selectedRecipeDetail?.description || 'No description'"></p>
                </div>

                <!-- Meta Info -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="bg-surface-primary rounded-lg p-3">
                        <span class="text-xs text-gray-500 dark:text-gray-400">Skills</span>
                        <p class="text-lg font-semibold text-green-500" x-text="selectedRecipeDetail?.skill_ids?.length || 0"></p>
                    </div>
                    <div class="bg-surface-primary rounded-lg p-3">
                        <span class="text-xs text-gray-500 dark:text-gray-400">Usage Count</span>
                        <p class="text-lg font-semibold text-purple-500" x-text="selectedRecipeDetail?.usage_count || 0"></p>
                    </div>
                    <div class="bg-surface-primary rounded-lg p-3 col-span-2">
                        <span class="text-xs text-gray-500 dark:text-gray-400">Created</span>
                        <p class="text-sm font-medium text-gray-700 dark:text-gray-200" x-text="selectedRecipeDetail?.created_at ? new Date(selectedRecipeDetail.created_at).toLocaleString() : 'Unknown'"></p>
                    </div>
                </div>

                <!-- Original Prompt -->
                <div class="bg-surface-primary rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Original Prompt</h3>
                    <p class="text-sm text-gray-700 dark:text-gray-200 italic" x-text="selectedRecipeDetail?.original_prompt || 'No prompt'"></p>
                </div>

                <!-- Skills List -->
                <div class="bg-surface-primary rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Skills</h3>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="skillId in (selectedRecipeDetail?.skill_ids || [])" :key="skillId">
                            <span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-full" x-text="skillId"></span>
                        </template>
                    </div>
                </div>

                <!-- DAG Plan -->
                <div class="bg-surface-primary rounded-lg p-4">
                    <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                        </svg>
                        Execution DAG
                    </h3>
                    <div x-show="selectedRecipeDetail?.dag_plan" class="space-y-3">
                        <!-- DAG Steps -->
                        <template x-for="(step, index) in (selectedRecipeDetail?.dag_plan?.steps || [])" :key="index">
                            <div class="flex items-start gap-3 p-3 bg-surface-tertiary/50 rounded-lg border border-border-default">
                                <div class="w-6 h-6 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center text-xs font-bold flex-shrink-0" x-text="index + 1"></div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="font-medium text-gray-900 dark:text-gray-100 text-sm" x-text="step.skill_id || step.name || 'Step ' + (index + 1)"></span>
                                        <span x-show="step.depends_on?.length" class="text-xs text-gray-400">
                                            depends on: <span x-text="step.depends_on?.join(', ')"></span>
                                        </span>
                                    </div>
                                    <p x-show="step.description" class="text-xs text-gray-500 dark:text-gray-400" x-text="step.description"></p>
                                    <p x-show="step.input" class="text-xs text-cyan-500 mt-1">
                                        Input: <span x-text="step.input"></span>
                                    </p>
                                </div>
                            </div>
                        </template>
                        <!-- Fallback: Show raw JSON if no steps -->
                        <div x-show="!selectedRecipeDetail?.dag_plan?.steps || selectedRecipeDetail?.dag_plan?.steps?.length === 0">
                            <pre class="text-xs text-gray-500 dark:text-gray-400 overflow-x-auto p-2 bg-surface-tertiary rounded" x-text="JSON.stringify(selectedRecipeDetail?.dag_plan, null, 2)"></pre>
                        </div>
                    </div>
                    <div x-show="!selectedRecipeDetail?.dag_plan" class="text-sm text-gray-500 dark:text-gray-400">
                        No DAG plan available
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-4 pt-4 border-t border-border-muted flex justify-between items-center">
                <button @click="executeRecipe(selectedRecipeDetail?.id); closeRecipeDetail()"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Execute Recipe
                </button>
                <button @click="closeRecipeDetail()"
                        class="px-4 py-2 bg-surface-tertiary hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg font-medium transition-colors">
                    Close
                </button>
            </div>
        </div>
    </div>
