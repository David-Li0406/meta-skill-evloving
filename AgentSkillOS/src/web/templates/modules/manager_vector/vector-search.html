        <!-- Phase: SEARCHING - Vector Search Progress (only in full mode, list visual) -->
        <div x-show="phase === 'searching' && uiHints.has_search && uiHints.search_visual === 'list'" x-transition class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">
            <!-- Search Progress -->
            <div class="lg:col-span-5 bento-card">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <!-- Searching icon (spinning) -->
                    <svg x-show="!searchComplete" class="w-5 h-5 text-amber-400 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <!-- Search complete icon (checkmark) -->
                    <svg x-show="searchComplete" class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span x-text="searchComplete ? 'Search Complete' : 'Vector Similarity Search...'"></span>
                </h2>

                <!-- Progress Steps -->
                <div class="space-y-3 mb-4">
                    <!-- Embedding query step -->
                    <div class="flex items-center gap-3 px-3 py-2 rounded-lg"
                         :class="vectorSearchState.queryEmbedded ? 'bg-green-500/10 border border-green-500/30' : (vectorSearchState.embeddingQuery ? 'bg-amber-500/10 border border-amber-500/30' : 'bg-surface-tertiary border border-border-default')">
                        <svg x-show="vectorSearchState.embeddingQuery && !vectorSearchState.queryEmbedded" class="w-4 h-4 text-amber-400 animate-spin flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <svg x-show="vectorSearchState.queryEmbedded" class="w-4 h-4 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <svg x-show="!vectorSearchState.embeddingQuery && !vectorSearchState.queryEmbedded" class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        </svg>
                        <span class="text-sm" :class="vectorSearchState.queryEmbedded ? 'text-green-400' : (vectorSearchState.embeddingQuery ? 'text-amber-400' : 'text-gray-400')">
                            Embedding query
                        </span>
                    </div>

                    <!-- Similarity search step -->
                    <div class="flex items-center gap-3 px-3 py-2 rounded-lg"
                         :class="searchComplete ? 'bg-green-500/10 border border-green-500/30' : (vectorSearchState.queryEmbedded && !searchComplete ? 'bg-amber-500/10 border border-amber-500/30' : 'bg-surface-tertiary border border-border-default')">
                        <svg x-show="vectorSearchState.queryEmbedded && !searchComplete" class="w-4 h-4 text-amber-400 animate-spin flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <svg x-show="searchComplete" class="w-4 h-4 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <svg x-show="!vectorSearchState.queryEmbedded" class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        </svg>
                        <span class="text-sm" :class="searchComplete ? 'text-green-400' : (vectorSearchState.queryEmbedded ? 'text-amber-400' : 'text-gray-400')">
                            Similarity search (top-<span x-text="vectorSearchState.topK || 10"></span>)
                        </span>
                    </div>
                </div>

                <!-- Stats -->
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-500 dark:text-gray-400">Total Skills in Index:</span>
                        <span class="font-mono text-cyan-500 dark:text-cyan-400" x-text="vectorSearchState.totalSkills || '—'"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 dark:text-gray-400">Results Found:</span>
                        <span class="font-mono text-cyan-500 dark:text-cyan-400" x-text="searchComplete ? (searchResult.skills?.length || 0) : '—'"></span>
                    </div>
                </div>

                <!-- Search Event Log -->
                <div class="mt-4 max-h-48 overflow-y-auto">
                    <template x-for="(event, index) in searchEvents.slice(-10)" :key="index">
                        <div class="text-xs py-1 text-gray-500 dark:text-gray-400">
                            <span x-text="formatSearchEvent(event)"></span>
                        </div>
                    </template>
                </div>

                <!-- View Results button -->
                <div x-show="searchComplete" x-transition class="mt-4 pt-4 border-t border-border-default">
                    <button
                        @click="confirmSearchResults()"
                        class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        View Results (<span x-text="searchResult.skills?.length || 0"></span> skills found)
                    </button>
                </div>
            </div>

            <!-- Results Preview -->
            <div class="lg:col-span-7 bento-card" style="min-height: 550px;">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Similarity Rankings
                </h2>
                <div x-show="!searchComplete" class="flex items-center justify-center h-[450px]">
                    <div class="text-center">
                        <svg class="w-16 h-16 text-purple-500/30 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <p class="text-gray-500 dark:text-gray-400">Searching for similar skills...</p>
                    </div>
                </div>
                <div x-show="searchComplete" class="space-y-2 max-h-[500px] overflow-y-auto">
                    <template x-for="(skill, index) in searchResult.skills || []" :key="skill.id">
                        <div class="flex items-center gap-3 px-3 py-2.5 bg-surface-tertiary rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
                            <span class="text-sm font-semibold text-gray-400 w-6 text-right" x-text="(index + 1)"></span>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" x-text="skill.name"></span>
                                    <span x-show="skill.is_official" class="px-1.5 py-0.5 bg-blue-500 text-white text-[9px] font-semibold rounded-full flex-shrink-0">Official</span>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 truncate" x-text="skill.description"></p>
                            </div>
                            <div class="flex-shrink-0 text-right">
                                <div class="text-sm font-mono font-semibold" :class="skill.similarity >= 0.5 ? 'text-green-500' : (skill.similarity >= 0.3 ? 'text-amber-500' : 'text-gray-400')" x-text="(skill.similarity * 100).toFixed(1) + '%'"></div>
                                <div class="text-[10px] text-gray-400">similarity</div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
