# =============================================================================
# AgentSkillOS Configuration — Vector Manager
# Priority: CLI arguments > Environment variables (.env) > config.yaml
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================

skill_group: skill_seeds
max_skills: 10
prune_enabled: true
port: 8765

# Module Selection
manager: vector
orchestrator: dag

# =============================================================================
# Shared Defaults
# =============================================================================
core:
  retry:
    base_delay: 1.0
    max_retries: 3

# =============================================================================
# Manager Plugins
# =============================================================================
managers:
  vector:
    top_k: 10
    collection_name: skills
    build:
      batch_size: 100
      max_workers: 4
      caching: true

# =============================================================================
# Orchestrator Plugins
# =============================================================================
orchestrators:
  dag:
    node_timeout: 3600.0
    max_concurrent: 6
    runtime:
      model: sonnet
  free-style:
    runtime:
      model: sonnet
  no-skill:
    runtime:
      model: sonnet
