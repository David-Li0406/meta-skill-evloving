skill_group: skill_1000
max_skills: 8
prune_enabled: true
port: 8765
manager: tree
orchestrator: dag

core:
  retry:
    base_delay: 1.0
    max_retries: 3

managers:
  direct: {}
  vector:
    top_k: 10
    collection_name: skills
    build:
      batch_size: 100
      max_workers: 4
      caching: true
  tree:
    branching_factor: 7
    max_depth: 6
    build:
      max_workers: 4
      caching: true
      num_retries: 3
      timeout: 600.0
      deterministic_prompts: true
      discovery_seed: 42
      prompt_fingerprint_version: v1
      cache_observability: true
    search:
      max_parallel: 5
      temperature: 0.3
      timeout: 600.0
      caching: true
    layering:
      mode: disabled
      max_dormant_suggestions: 10
      installs_data_path: tools/skills_downloader_from_skillssh/skills_scraped.json
      dormant_search:
        keyword_enabled: true
        cache_ttl: 31536000

orchestrators:
  dag:
    node_timeout: 3600.0
    max_concurrent: 6
    batch_auto_plan: 0
    runtime:
      model: sonnet
      execution_timeout: 0.0
      summary_max_length: 500
  free-style:
    runtime:
      model: sonnet
      execution_timeout: 0.0
      summary_max_length: 500
  no-skill:
    runtime:
      model: sonnet
      execution_timeout: 0.0
      summary_max_length: 500
